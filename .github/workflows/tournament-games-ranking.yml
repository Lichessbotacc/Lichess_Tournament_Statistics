name: Tournament Scripts

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run-scripts:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - name: Manual Script (mit Turnier-ID)
        run: python scripts/manual/tournament_games_ranking.py

      - name: Auto Script (neuestes Turnier)
        run: python scripts/auto/latest_tournament_ranking.py
