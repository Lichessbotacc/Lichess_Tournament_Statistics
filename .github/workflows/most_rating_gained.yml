name: Most Rating Gained

on:
  push:
    paths:
      - 'scripts/solo/most_rating_gained.py'

  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        run: python scripts/solo/most_rating_gained.py
