name: Best Performance Ranking

on:
  push:
    branches:
      - main
    paths:
      - "scripts/auto/best_performance.py"

jobs:
  run-points-script:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Abhängigkeiten installieren
        run: pip install requests

      - name: Best Performance Script ausführen
        run: python scripts/auto/best_performance.py
